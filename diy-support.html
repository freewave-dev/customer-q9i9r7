.hero {

}
/* Gradient depth */
.hero-bg {
  position: absolute;
  inset: 0;
  background:

    linear-gradient(135deg, #0d2a4a 0%, #123e6b 50%, #0b1f35 100%);
  z-index: 1;
}
/* Subtle network mesh */
.hero-mesh {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: .15;
  animation: drift 40s linear infinite;
  z-index: 2;
}
@keyframes drift {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}
.hero-content {
  position: relative;
  z-index: 3;
}
.brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.logo-mark {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 50px;
}
.logo-mark span {
  width: 10px;
  background: linear-gradient(180deg, #7fd0ff, #2ea3f2);
  border-radius: 3px;
  transform-origin: bottom;
  opacity: 0;
  animation: cellBar 2s ease-out forwards;
}
.logo-mark span:nth-child(1) { height: 15px; animation-delay: 0s; }
.logo-mark span:nth-child(2) { height: 25px; animation-delay: .15s; }
.logo-mark span:nth-child(3) { height: 35px; animation-delay: .3s; }
.logo-mark span:nth-child(4) { height: 50px; animation-delay: .45s; }
@keyframes cellBar {
  0% { opacity: 0; transform: scaleY(0); }
  50% { opacity: 1; transform: scaleY(1.1); box-shadow: 0 0 15px rgba(127,208,255,.8); }
  100% { opacity: .9; transform: scaleY(1); }
}
.hero h1 {
  font-size: 42px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -1px;
  background: none;
  -webkit-background-clip: unset;
  background-clip: unset;
  -webkit-text-fill-color: unset;
  color: white;
}
.dot {
  color: #7fd0ff;
}
.tagline {
  margin-top: 12px;
  font-size: 18px;
  opacity: .85;
}

@media (max-width: 768px) {
  .hero {

// ─── State ────────────────────────────────────────────────────────────────────
var selProduct = null;
var selProblem = null;
var feed = document.getElementById('chat-messages');

// ─── Helpers ──────────────────────────────────────────────────────────────────
function scrollDown() {
  window.scrollTo(0, document.body.scrollHeight);
}

function showTyping() {
  var row = document.createElement('div');
  row.className = 'cr';
  row.id = 'typing';
  row.innerHTML = '<div class="av">FW</div><div class="bl"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  feed.appendChild(row);
  scrollDown();
}

function hideTyping() {
  var t = document.getElementById('typing');
  if (t) t.parentNode.removeChild(t);
}

function botSay(html, pause, cb) {
  showTyping();
  setTimeout(function() {
    hideTyping();
    var row = document.createElement('div');
    row.className = 'cr';
    row.innerHTML = '<div class="av">FW</div><div class="bl">' + html + '</div>';
    feed.appendChild(row);
    scrollDown();
    if (typeof cb === 'function') cb();
  }, pause || 650);
}

function userSay(label) {
  var row = document.createElement('div');
  row.className = 'cr ur';
  row.innerHTML = '<div class="bl">' + label + '</div>';
  feed.appendChild(row);
  scrollDown();
}

function showOptions(options, onPick) {
  var wrap = document.createElement('div');
  wrap.className = 'opts';
  wrap.id = 'opts';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'ob';
    btn.textContent = opt.label;
    btn.onclick = function() { onPick(opt); };
    wrap.appendChild(btn);
  });
  feed.appendChild(wrap);
  scrollDown();
}

function clearOptions() {
  var o = document.getElementById('opts');
  if (o) o.parentNode.removeChild(o);
}

// ─── Flow ─────────────────────────────────────────────────────────────────────
function startChat() {
  feed.innerHTML = '';
  selProduct = null;
  selProblem = null;
  botSay("Hi! I'm the Freewave.Online support assistant. I'll walk you through some fixes.", 400, function() {
    botSay('What would you like help with today?', 750, function() {
      showOptions(PRODUCTS, pickProduct);
    });
  });
}

function pickProduct(product) {
  clearOptions();
  userSay(product.label);
  if (product.id === 'calyx') {
    botSay('Got it \u2014 <strong>Calyx Internet</strong>. Which setup do you have?', 700, function() {
      botSay(
        '<strong>Calyx Hotspot</strong> \u2014 You received a portable hotspot device (Franklin T10 or MiFi X PRO 5G) from Calyx.<br><br>' +
        '<strong>Sprout SIM (Own Router)</strong> \u2014 You got a SIM card only and put it in your own router, like a GL.iNet or Peplink.',
        850,
        function() { showOptions(CALYX_PLANS, pickCalyxPlan); }
      );
    });
  } else {
    selProduct = product;
    botSay('Got it \u2014 <strong>' + product.label + '</strong>. What problem are you experiencing?', 700, function() {
      showOptions(PROBLEMS[product.id], pickProblem);
    });
  }
}

function pickCalyxPlan(plan) {
  clearOptions();
  userSay(plan.label);
  if (plan.id === 'calyx-unsure') {
    botSay(
      "No problem! Here's how to tell:<br><br>" +
      '<strong>Calyx Hotspot:</strong> You have a small portable device (about the size of a phone) that Calyx shipped to you. It has its own battery and screen.<br><br>' +
      '<strong>Sprout SIM:</strong> You received just a SIM card from Calyx and inserted it into a separate router you purchased yourself (like a GL-X2000, GL-XE3000, or Peplink).',
      900,
      function() { showOptions(CALYX_PLANS.filter(function(p) { return p.id !== 'calyx-unsure'; }), pickCalyxPlan); }
    );
    return;
  }
  selProduct = plan;
  botSay('Got it \u2014 <strong>' + plan.label + '</strong>. What problem are you experiencing?', 700, function() {
    showOptions(PROBLEMS[plan.id], pickProblem);
  });
}

function pickProblem(problem) {
  clearOptions();
  selProblem = problem;
  userSay(problem.label);

  var tips = TIPS[selProduct.id] && TIPS[selProduct.id][problem.id];
  if (!tips) {
    botSay("I don't have steps for that yet. Let's start over.", 600, function() { startChat(); });
    return;
  }

  var stepsHtml = '<ul class="tip-steps">';
  tips.steps.forEach(function(s) { stepsHtml += '<li>' + s + '</li>'; });
  stepsHtml += '</ul>';

  var linksHtml = '';
  if (tips.links && tips.links.length) {
    linksHtml = '<div class="link-block">';
    tips.links.forEach(function(l) {
      var ext = l.url.indexOf('http') === 0;
      var target = ext ? ' target="_blank" rel="noopener noreferrer"' : '';
      linksHtml += '<a href="' + l.url + '" class="cl ' + (l.cls || '') + '"' + target + '>' + l.label + '</a>';
    });
    linksHtml += '</div>';
  }

  botSay('Here are some things to try:<br>' + stepsHtml + linksHtml, 850, function() {
    setTimeout(function() {
      botSay('Did that fix it?', 550, function() {
        showOptions([
          { id: 'yes', label: "Yes, it's fixed!" },
          { id: 'no',  label: 'No, still having issues' },
        ], pickResolved);
      });
    }, 350);
  });
}

function pickResolved(choice) {
  clearOptions();
  userSay(choice.label);
  if (choice.id === 'yes') {
    botSay("That's great! Glad we could help. Come back anytime.", 700, function() {
      showRestart('Ask about something else');
    });
  } else {
    botSay('No worries. Here are a couple more options:', 700, function() {
      botSay(
        '<strong>Ask an AI assistant</strong> \u2014 describe your exact issue and get personalized help:' +
        '<div class="link-block">' +
          '<a href="https://chat.openai.com/" target="_blank" rel="noopener noreferrer" class="cl">ChatGPT</a>' +
          '<a href="https://grok.com/" target="_blank" rel="noopener noreferrer" class="cl ora">Grok</a>' +
          '<a href="https://gemini.google.com/" target="_blank" rel="noopener noreferrer" class="cl grn">Gemini</a>' +
        '</div>',
        800,
        function() {
          botSay(
            '<strong>Want a human to take care of it?</strong><br>' +
            'Our Remote Support plan gives you access to a real tech for $10/month \u2014 cancel after 12 months.' +
            '<div class="link-block">' +
              '<a href="support-plan.html" class="cl ora">View Support Plan</a>' +
            '</div>',
            900,
            function() { showRestart('Start over with a different issue'); }
          );
        }
      );
    });
  }
}

function showRestart(label) {
  var wrap = document.createElement('div');
  wrap.className = 'restart-wrap';
  wrap.innerHTML = '<button class="restart-btn" onclick="startChat()">' + label + '</button>';
  feed.appendChild(wrap);
  scrollDown();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
startChat();
</script>
